<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civitai Gallery Results</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="scan-overlay"></div>
    <div class="scan-beam"></div>

    <header>
        <div class="header-left">
            <div class="header-stats">
                <span id="count-value">0</span>
                <span id="count-label">items</span>
            </div>


        </div>

        <div class="header-center">
            <h1><span data-i18n="results_title">Gallery Parser</span> <span id="authorName">...</span></h1>
        </div>

        <div class="header-right">

            <div class="actions-group">
                <button id="closeTab" type="button" class="action-btn group" data-i18n-title="results_close_title"
                    title="Close Tab">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div id="gallery" class="gallery">
        <!-- Rendered by results.js -->
    </div>

    <div id="toast" class="toast">Action completed!</div>

    <footer>
        <div class="footer-left">
            <button id="importBtn" type="button" class="filter-btn group"
                data-i18n-title="results_import_title" title="Import from Excel">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="16 2 16 8 22 8" />
                    <path d="M14 13h5M14 17h3" />
                    <circle cx="8" cy="18" r="5" fill="#111821" stroke="currentColor" />
                    <g class="transition-all duration-300 group-hover:translate-y-0.5">
                        <path d="M8 15 L8 19.5 M6.5 18 L8 19.5 L9.5 18" />
                    </g>
                </svg>
            </button>
            <input type="file" id="importFileInput" accept=".xlsx,.xls" style="display: none;">
            <button id="exportBtn" type="button" class="filter-btn group"
                data-i18n-title="results_export_title" title="Export to Excel">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="16 2 16 8 22 8" />
                    <path d="M14 13h5M14 17h3" />
                    <circle cx="8" cy="18" r="5" fill="#111821" stroke="currentColor" />
                    <g class="transition-all duration-300 group-hover:-translate-y-0.5">
                        <path d="M8 21 L8 16.5 M6.5 18 L8 16.5 L9.5 18" />
                    </g>
                </svg>
            </button>
        </div>
        <div class="footer-center">
            <button id="toggleAllReactionsBtn" type="button" class="filter-btn reaction-toggle"
                data-i18n-title="results_toggle_reactions_title" title="Toggle Reactions">
                <!-- SVG will be injected by results.js -->
            </button>
            <button type="button" class="filter-btn active" data-filter="all" data-i18n-title="results_filter_all_title"
                title="All">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="7" height="7" x="3" y="3" rx="1" />
                    <rect width="7" height="7" x="14" y="3" rx="1" />
                    <rect width="7" height="7" x="14" y="14" rx="1" />
                    <rect width="7" height="7" x="3" y="14" rx="1" />
                </svg>
            </button>
            <button type="button" class="filter-btn" data-filter="new" data-i18n-title="results_filter_new_title"
                title="New">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
                </svg>
            </button>
            <button type="button" class="filter-btn" data-filter="changed"
                data-i18n-title="results_filter_changed_title" title="Changed">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6" />
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
                    <path d="M3 22v-6h6" />
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
                </svg>
            </button>
            <button type="button" class="filter-btn" data-filter="removed"
                data-i18n-title="results_filter_removed_title" title="Removed">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18" />
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    <line x1="10" y1="11" x2="10" y2="17" />
                    <line x1="14" y1="11" x2="14" y2="17" />
                </svg>
            </button>
            <button id="onlyZeroBtn" type="button" class="filter-btn" data-i18n-title="results_filter_zero_title"
                title="Show Zero Reactions">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
                </svg>
            </button>
        </div>

        <div class="footer-right">
            <button id="scrollTop" type="button" class="group" data-i18n-title="results_scroll_top_title" title="Top">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5" />
                    <polyline points="5 12 12 5 19 12" />
                </svg>
            </button>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="lib/xlsx.full.min.js"></script>
    <script src="i18n.js"></script>
    <script src="excel_handler.js"></script>
    <script src="results.js"></script>
</body>

</html>
